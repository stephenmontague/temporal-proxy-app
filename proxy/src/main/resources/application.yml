# Bootstrap-only configuration. Operational config (devices, routing, enabled) lives in
# the ProxyControlWorkflow in Temporal and is hot-applied by the Reconciler.
#
# Default/local profile targets a local Temporal server on 7233 (Docker stack or CLI dev
# server) — Server 1.31+ with activity.enableStandalone=true required (no mTLS).
# Activate the `cloud` profile to target Temporal Cloud with per-install mTLS creds.
spring:
  application:
    name: proxy-app
  temporal:
    connection:
      target: 127.0.0.1:7233
    namespace: default
    workers-auto-discovery:
      packages:
        - com.proxyapp.temporal
        - com.proxyapp.control

# 8090-8092 keep clear of the local Docker Temporal UI (8080) and other dev stacks
server:
  port: 8090

proxy:
  task-queue: proxy-main            # data path: DeliverToEdge / DeliverToCloud activities
  control-task-queue: proxy-control # control workflow; stays polling during soft-disable
  profile: device-fleet             # which message catalog/profile to load
  cloud:
    base-url: http://localhost:8091
  ingress:
    tcp-port-pool: 6000-6010        # site infra: inbound TCP ports IT made available
    ftp-port: 2221
    ftp-root: ./data/ftp-ingress
    ftp-user: edge
    ftp-password: edge
  seed:
    devices-resource: classpath:seed/device-fleet-devices.json

---
spring:
  config:
    activate:
      on-profile: cloud
  temporal:
    connection:
      target: ${TEMPORAL_TARGET} # <ns-id>.<region>.tmprl.cloud:7233
      mtls:
        key-file: ${TEMPORAL_KEY_FILE}
        cert-chain-file: ${TEMPORAL_CERT_FILE}
    namespace: ${TEMPORAL_NAMESPACE} # <tenant>.<account-id>
