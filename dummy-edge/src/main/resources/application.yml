spring:
  application:
    name: dummy-edge

server:
  port: 8092

edge:
  # Where this device pushes inbound messages (the proxy's ingress channels)
  proxy:
    http-base: http://localhost:8090
    pick-confirm-path: /pick-confirm
    tcp-host: 127.0.0.1
    putaway-confirm-port: 6001
    ftp-host: 127.0.0.1
    ftp-port: 2221
    ftp-user: edge
    ftp-password: edge
    cycle-count-confirm-folder: cycle-count-confirm
  # This device's own channels (where the proxy delivers outbound messages)
  tcp-listen-port: 9001
  ftp-listen-port: 2222
  ftp-root: ./data/edge-ftp
  ftp-user: edge
  ftp-password: edge
  cycle-count-folder: cycle-count
  # Simulated device latency before it pushes the paired confirm
  confirm-delay-ms: 300

---
spring:
  config:
    activate:
      on-profile: local
